apiVersion: v1
kind: Service
metadata:
  name: backup-restore-webhook
  namespace: backup-system
spec:
  ports:
  - name: https
    port: 443
    targetPort: webhook
  selector:
    app.kubernetes.io/name: backup-restore-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: backup-restore-operator
  name: backup-restore-operator
  namespace: backup-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backup-restore-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backup-restore-operator
    spec:
      containers:
      - args:
        - --leader-elect=true
        - --cluster-ref=cluster-a
        - --workspace=/workspace
        - --max-concurrent-backups=3
        - --max-concurrent-restores=1
        - --webhook-cert-dir=/tmp/k8s-webhook-server/serving-certs
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        image: backup-restore-operator:dev
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
        name: manager
        ports:
        - containerPort: 8080
          name: metrics
        - containerPort: 8081
          name: health
        - containerPort: 9443
          name: webhook
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /workspace
          name: workspace
        - mountPath: /tmp
          name: tmp
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-cert
          readOnly: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: backup-restore-operator
      terminationGracePeriodSeconds: 30
      volumes:
      - emptyDir: {}
        name: workspace
      - emptyDir: {}
        name: tmp
      - name: webhook-cert
