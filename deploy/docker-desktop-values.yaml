# Local Docker Desktop profile. Do not use this file unchanged in production.
image:
  repository: backup-restore-operator
  tag: dev-local-12
  pullPolicy: IfNotPresent

replicaCount: 1
leaderElection: true
clusterRef: docker-desktop

webhook:
  enabled: true
  certManager:
    enabled: true
    issuerName: backup-restore-selfsigned
  tlsSecretName: backup-restore-webhook-cert

workspace:
  mountPath: /workspace
  emptyDir:
    sizeLimit: 20Gi
  existingClaim: backup-restore-workspace

localRepositoryMount:
  enabled: true
  hostPath: /var/lib/backup-restore-operator/repository
  mountPath: /repository
  type: DirectoryOrCreate
  initPermissions:
    enabled: true
    image: busybox:1.37.0
    uid: 65532
    gid: 65532
    mode: "0770"

resources:
  requests: {cpu: 100m, memory: 128Mi}
  limits: {cpu: "2", memory: 2Gi}

webui:
  enabled: true
  bindAddress: ":8082"
  service:
    type: ClusterIP
    port: 80
    nodePort: null
  resources:
    requests: {cpu: 25m, memory: 32Mi}
    limits: {cpu: 250m, memory: 128Mi}

pluginConfig:
  create: true
  maxBackupTasks: 3
  maxRestoreTasks: 1
  pageSize: 500
  terminalTaskTTLDays: 90
