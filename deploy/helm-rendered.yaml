# Source: backup-restore-operator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-restore-operator
  namespace: backup-system
  labels:
    app.kubernetes.io/name: backup-restore-operator
    app.kubernetes.io/instance: backup-restore
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backup-restore-operator
      app.kubernetes.io/instance: backup-restore
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backup-restore-operator
        app.kubernetes.io/instance: backup-restore
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: backup-restore-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      initContainers:
      - name: initialize-local-repository
        image: "busybox:1.37.0"
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -ec
        - |
          current_uid="$(stat -c %u /repository)"
          current_gid="$(stat -c %g /repository)"
          if [ "$current_uid" != "65532" ] || [ "$current_gid" != "65532" ]; then
            chown -R 65532:65532 /repository
            chmod 0770 /repository
          fi
        securityContext:
          runAsUser: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
            add: ["CHOWN", "FOWNER"]
        volumeMounts:
        - {name: local-repository, mountPath: /repository}
      containers:
      - name: manager
        image: "backup-restore-operator:dev-local-7"
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef: {fieldPath: spec.nodeName}
        - name: POD_NAME
          valueFrom:
            fieldRef: {fieldPath: metadata.name}
        args:
        - --leader-elect=true
        - --cluster-ref=docker-desktop
        - --workspace=/workspace
        - --max-concurrent-backups=3
        - --max-concurrent-restores=1
        - --enable-webhooks=true
        ports:
        - {name: metrics, containerPort: 8080}
        - {name: health, containerPort: 8081}
        - {name: webhook, containerPort: 9443}
        livenessProbe: {httpGet: {path: /healthz, port: health}}
        readinessProbe: {httpGet: {path: /readyz, port: health}}
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: ["ALL"]}
          readOnlyRootFilesystem: true
        volumeMounts:
        - {name: workspace, mountPath: /workspace}
        - {name: tmp, mountPath: /tmp}
        - {name: webhook-cert, mountPath: /tmp/k8s-webhook-server/serving-certs, readOnly: true}
        - {name: local-repository, mountPath: /repository}
      volumes:
      - name: workspace
        persistentVolumeClaim: {claimName: backup-restore-workspace}
      - {name: tmp, emptyDir: {}}
      - name: webhook-cert
        secret: {secretName: backup-restore-webhook-cert}
      - name: local-repository
        hostPath: {path: /var/lib/backup-restore-operator/repository, type: DirectoryOrCreate}
      nodeSelector:
        {}
      tolerations:
        []
      affinity:
        {}
---
# Source: backup-restore-operator/templates/webui.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-restore-operator-webui
  namespace: backup-system
  labels:
    app.kubernetes.io/name: backup-restore-operator-webui
    app.kubernetes.io/instance: backup-restore
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backup-restore-operator-webui
      app.kubernetes.io/instance: backup-restore
      app.kubernetes.io/component: webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backup-restore-operator-webui
        app.kubernetes.io/instance: backup-restore
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: webui
    spec:
      serviceAccountName: backup-restore-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
      - name: webui
        image: "backup-restore-operator:dev-local-7"
        imagePullPolicy: IfNotPresent
        command: ["/webui"]
        args:
        - --bind-address=:8082
        - --cluster-ref=docker-desktop
        ports:
        - {name: http, containerPort: 8082}
        livenessProbe:
          httpGet: {path: /api/health, port: http}
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet: {path: /api/health, port: http}
          initialDelaySeconds: 2
          periodSeconds: 5
        resources:
          limits:
            cpu: 250m
            memory: 128Mi
          requests:
            cpu: 25m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: ["ALL"]}
          readOnlyRootFilesystem: true
      nodeSelector:
        {}
      tolerations:
        []
      affinity:
        {}
