# Source: backup-restore-operator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-restore-operator
  namespace: backup-system
  labels:
    app.kubernetes.io/name: backup-restore-operator
    app.kubernetes.io/instance: br
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backup-restore-operator
      app.kubernetes.io/instance: br
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backup-restore-operator
        app.kubernetes.io/instance: br
        app.kubernetes.io/managed-by: Helm
    spec:
      serviceAccountName: backup-restore-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
      - name: manager
        image: "backup-restore-operator:dev"
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef: {fieldPath: spec.nodeName}
        - name: POD_NAME
          valueFrom:
            fieldRef: {fieldPath: metadata.name}
        args:
        - --leader-elect=true
        - --cluster-ref=cluster-a
        - --workspace=/workspace
        - --max-concurrent-backups=3
        - --max-concurrent-restores=1
        - --enable-webhooks=true
        ports:
        - {name: metrics, containerPort: 8080}
        - {name: health, containerPort: 8081}
        - {name: webhook, containerPort: 9443}
        livenessProbe: {httpGet: {path: /healthz, port: health}}
        readinessProbe: {httpGet: {path: /readyz, port: health}}
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: ["ALL"]}
          readOnlyRootFilesystem: true
        volumeMounts:
        - {name: workspace, mountPath: /workspace}
        - {name: tmp, mountPath: /tmp}
        - {name: webhook-cert, mountPath: /tmp/k8s-webhook-server/serving-certs, readOnly: true}
      volumes:
      - name: workspace
        emptyDir:
          sizeLimit: 20Gi
      - {name: tmp, emptyDir: {}}
      - name: webhook-cert
        secret: {secretName: backup-restore-webhook-cert}
      nodeSelector:
        {}
      tolerations:
        []
      affinity:
        {}
---
