apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-restore-operator
  namespace: backup-system
  labels:
    app.kubernetes.io/name: backup-restore-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backup-restore-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backup-restore-operator
    spec:
      serviceAccountName: backup-restore-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: backup-restore-operator:dev
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef: {fieldPath: spec.nodeName}
        - name: POD_NAME
          valueFrom:
            fieldRef: {fieldPath: metadata.name}
        args:
        - --leader-elect=true
        - --cluster-ref=cluster-a
        - --workspace=/workspace
        - --max-concurrent-backups=3
        - --max-concurrent-restores=1
        - --webhook-cert-dir=/tmp/k8s-webhook-server/serving-certs
        ports:
        - name: metrics
          containerPort: 8080
        - name: health
          containerPort: 8081
        - name: webhook
          containerPort: 9443
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "2"
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: tmp
          mountPath: /tmp
        - name: webhook-cert
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
      terminationGracePeriodSeconds: 30
      volumes:
      - name: workspace
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      - name: webhook-cert
        secret:
          secretName: backup-restore-webhook-cert
---
apiVersion: v1
kind: Service
metadata:
  name: backup-restore-webhook
  namespace: backup-system
spec:
  selector:
    app.kubernetes.io/name: backup-restore-operator
  ports:
  - name: https
    port: 443
    targetPort: webhook
