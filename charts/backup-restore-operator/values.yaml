image:
  repository: backup-restore-operator
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 1
leaderElection: true
clusterRef: cluster-a

rbac:
  create: true
serviceAccount:
  create: true
  name: backup-restore-operator

webhook:
  enabled: true
  certManager:
    enabled: true
    issuerName: backup-restore-selfsigned
  tlsSecretName: backup-restore-webhook-cert

workspace:
  mountPath: /workspace
  emptyDir:
    sizeLimit: 20Gi
  existingClaim: ""

# Exactly one Local repository root can be mounted into the manager in v1.0.
# Pin the pod with nodeSelector when hostPath is enabled. SFTP has no such limit.
localRepositoryMount:
  enabled: false
  hostPath: /var/lib/backup-repository
  mountPath: /repository
  type: DirectoryOrCreate
  initPermissions:
    enabled: false
    image: busybox:1.37.0
    uid: 65532
    gid: 65532
    mode: "0770"

nodeSelector: {}
tolerations: []
affinity: {}

resources:
  requests: {cpu: 100m, memory: 128Mi}
  limits: {cpu: "2", memory: 2Gi}

metrics:
  serviceMonitor:
    enabled: false
    interval: 30s

# Lightweight CRD management console. Authentication is intentionally not
# included in v1.0, so expose it only on a trusted local/admin network.
webui:
  enabled: false
  bindAddress: ":8082"
  service:
    type: ClusterIP
    port: 80
    nodePort: null
  resources:
    requests: {cpu: 25m, memory: 32Mi}
    limits: {cpu: 250m, memory: 128Mi}

pluginConfig:
  create: true
  maxBackupTasks: 3
  maxRestoreTasks: 1
  pageSize: 500
  terminalTaskTTLDays: 90
