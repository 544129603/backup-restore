{{- if .Values.webui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backup-restore.name" . }}-webui
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "backup-restore.name" . }}-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "backup-restore.name" . }}-webui
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "backup-restore.name" . }}-webui
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/component: webui
    spec:
      serviceAccountName: {{ include "backup-restore.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      containers:
      - name: webui
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["/webui"]
        args:
        - --bind-address={{ .Values.webui.bindAddress }}
        - --cluster-ref={{ required "clusterRef is required" .Values.clusterRef }}
        ports:
        - {name: http, containerPort: 8082}
        livenessProbe:
          httpGet: {path: /api/health, port: http}
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet: {path: /api/health, port: http}
          initialDelaySeconds: 2
          periodSeconds: 5
        resources: {{- toYaml .Values.webui.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: ["ALL"]}
          readOnlyRootFilesystem: true
      nodeSelector: {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations: {{- toYaml .Values.tolerations | nindent 8 }}
      affinity: {{- toYaml .Values.affinity | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backup-restore.name" . }}-webui
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "backup-restore.name" . }}-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: webui
spec:
  type: {{ .Values.webui.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "backup-restore.name" . }}-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: webui
  ports:
  - name: http
    port: {{ .Values.webui.service.port }}
    targetPort: http
    {{- if and (eq .Values.webui.service.type "NodePort") .Values.webui.service.nodePort }}
    nodePort: {{ .Values.webui.service.nodePort }}
    {{- end }}
{{- end }}
